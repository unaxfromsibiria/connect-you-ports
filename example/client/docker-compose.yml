services:
  connection-port-local:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RUST_LOG: "info"
      SERVER: "0"
      READ_BUFFER_SIZE: "4096"
      CLIENT_NAME: "example-or-edit"
      WORKERS: "2"
      TCP_SOCKETS: "web-api:0.0.0.0:7128;iperf-tcp:0.0.0.0:5501"
      UDP_SOCKETS: "dns:0.0.0.0:5533;iperf-udp:0.0.0.0:5500"
      CRYPTO_KEY: "<EDIT: set the same key value from server>"
      COMPRESS: "0"
      REDIS_URL: "redis://default:<EDIT: set password for redis>@<EDIT: set your server>:6379/"
    ports:
      - "7128:7128/tcp"  # curl -x http://127.0.0.1:7128 https://docs.rs/
      - "9091:5501/tcp"  # iperf -p 9091 -c 127.0.0.1 
      - "9092:5500/udp"  # iperf -u -p 9092 -c 127.0.0.1 
      - "5533:5533/udp"  # nslookup -port=5533 google.com 127.0.0.1
    restart: always
